version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       chaveiro_pro
      POSTGRES_USER:     chaveiro
      POSTGRES_PASSWORD: chaveiro_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chaveiro -d chaveiro_pro"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Node.js ──────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://chaveiro:chaveiro_secret@db:5432/chaveiro_pro
      JWT_SECRET:   troque_em_producao_use_openssl_rand_hex_32
      PORT:         3001
      NODE_ENV:     development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── Frontend Vite ────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
